services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shoproz
      POSTGRES_USER: shoproz
      POSTGRES_PASSWORD: shoproz_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoproz -d shoproz"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/shoproz
      DB_USER: shoproz
      DB_PASSWORD: shoproz_pass
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
